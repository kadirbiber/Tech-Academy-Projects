<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My One Page Website</title>
</head>
<body>

    <nav>
        <a href="#home">Home</a> |
        <a href="#pictures">Pictures</a> |
        <a href="#contact">Contact</a> |
        <a href="#videos">Videos</a>
    </nav>

    <section id="home">
        <h1>Welcome to My One Page Website</h1>
        <p>This website is a basic one-page HTML project. It includes pictures, a contact form, videos, navigation links, and a footer.</p>
    </section>

    <section id="pictures">
        <h2>Pictures</h2>
        <img src="https://via.placeholder.com/300" alt="Sample picture 1">
        <img src="https://via.placeholder.com/300" alt="Sample picture 2">
    </section>

    <section id="contact">
        <h2>Contact Form</h2>
        <form>
            <label for="name">Name:</label><br>
            <input type="text" id="name" name="name"><br><br>

            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email"><br><br>

            <label for="message">Message:</label><br>
            <input type="text" id="message" name="message"><br><br>

            <input type="submit" value="Submit">
        </form>
    </section>

    <section id="videos">
        <h2>Videos</h2>
        <iframe width="560" height="315"
            src="https://www.youtube.com/embed/dQw4w9WgXcQ"
            title="YouTube video player"
            allowfullscreen>
        </iframe>
    </section>

    <footer>
        <p>&copy; 2026 My One Page Website. All rights reserved.</p>
    </footer>

</body>
</html>
